{% extends 'common/base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width:350px">

    <h3 class="text-center mb-3">Set New Password</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>New Password</label>
            <input type="password" name="password1" class="form-control" placeholder="Enter new password" required>
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" name="password2" class="form-control" placeholder="Re-enter password" required>
        </div>

        <div class="mb-3">
            <input type="submit" value="Reset Password" class="btn form-control btn-primary">
        </div>
    </form>

    {% if messages %}
        {% for msg in messages %}
            <script>alert('{{ msg }}')</script>
        {% endfor %}
    {% endif %}

  </div>
</div>
{% endblock %}

{% block footer %}
{% endblock %}
