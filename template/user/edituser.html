
{% extends 'user/pixel1.html' %}

{% block content %}

<div class="container mt-5 pt-5 d-flex justify-content-center">

    <div class="card shadow p-4" style="width:500px; border-radius:12px;">

        <h3 class="text-center mb-4">Edit Profile</h3>

        <form action="{% url 'edituser' %}" enctype="multipart/form-data" method="post">
            {% csrf_token %}

            
            <div class="text-center mb-3">
                {% if user_details.profile_photo %}
                    <img src="{{ user_details.profile_photo.url }}" width="120" style="border-radius:50%;">
                {% endif %}
            </div>

            <div class="mb-3">
                <label>Profile Photo</label>
                <input type="file" name="profile_photo" class="form-control">
            </div>

            
            <div class="mb-3">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ user_details.user.first_name }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ user_details.user.last_name }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" value="{{ user_details.user.username }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" value="{{ user_details.user.email }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter new password" class="form-control">
            </div>

           
            <div class="mb-3">
                <label>Address</label>
                <textarea name="address" rows="3" class="form-control">{{ user_details.address }}</textarea>
            </div>

    
            <div class="mb-3">
                <label>City</label>
                <input type="text" name="city" value="{{ user_details.city }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>State</label>
                <input type="text" name="state" value="{{ user_details.state }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="number" name="phone" value="{{ user_details.phone }}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Postal Code</label>
                <input type="number" name="postal_code" value="{{ user_details.postal_code }}" class="form-control">
            </div>

            <!-- Buttons -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                    Update Profile
                </button>

                <a href="{% url 'userdetails' %}" class="btn btn-outline-secondary">
                    ← Back
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}

{% block footer %}
{% endblock %}
