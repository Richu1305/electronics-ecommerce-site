{% extends 'manager/pixel.html' %}

{% block content %}
<div class="container" style="margin-top: 150px; margin-bottom: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0" style="background-color: #f8f9fa;">
                <div class="card-header bg-light text-dark rounded-top py-3 border-bottom">
                    <h4 class="mb-0 text-center fw-bold" style="letter-spacing: 1px;">Edit Product</h4>
                </div>
                <div class="card-body p-4">
                    {% for p in pdata %}
                    <form method="POST" action="" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Product Name</label>
                            <input type="text" name="Name" class="form-control" value="{{ p.Name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Category</label>
                            <select name="category" class="form-select" required>
                                {% for cat in c %}
                                    <option value="{{ cat.id }}" {% if cat.id == p.category_id %}selected{% endif %}>{{ cat.Name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Price (₹)</label>
                                <input type="number" step="0.01" name="price" class="form-control" value="{{ p.Price }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Stock Quantity</label>
                                <input type="number" name="stock" class="form-control" value="{{ p.stock }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Product Image (Leave blank to keep existing)</label>
                            <input type="file" name="image" class="form-control">
                            {% if p.image %}
                                <div class="mt-2 small px-1 text-secondary">
                                    <i class="bi bi-info-circle me-1"></i>Current image exists. 
                                </div>
                            {% endif %}
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Description</label>
                            <textarea name="description" class="form-control" rows="4" required>{{ p.Description }}</textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 text-uppercase fw-bold shadow-sm" style="letter-spacing: 1px;">Update Product</button>
                    </form>
                    {% endfor %}
                    <div class="text-center mt-3">
                        <a href="{% url 'view_product' %}" class="btn btn-outline-secondary">
                            &larr; Back to View Product
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
