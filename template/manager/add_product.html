{% extends 'manager/pixel.html' %}

{% block content %}
<div class="container" style="margin-top: 150px; margin-bottom: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0" style="background-color: #f8f9fa;">
                <div class="card-header bg-light text-dark rounded-top py-3 border-bottom">
                    <h4 class="mb-0 text-center fw-bold" style="letter-spacing: 1px;">Add Product</h4>
                </div>
                <div class="card-body p-4">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    <form method="POST" action="" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Product Name</label>
                            <input type="text" name="Name" class="form-control" placeholder="Enter product name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Category</label>
                            <select name="category" class="form-select" required>
                                <option value="" selected disabled>Select Category</option>
                                {% for cat in c %}
                                    <option value="{{ cat.id }}">{{ cat.Name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Price (₹)</label>
                                <input type="number" step="0.01" name="Price" class="form-control" placeholder="0.00" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Stock Quantity</label>
                                <input type="number" name="Stock" class="form-control" placeholder="0" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark">Product Image</label>
                            <input type="file" name="image" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Description</label>
                            <textarea name="Description" class="form-control" rows="4" placeholder="Enter product description" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 text-uppercase fw-bold shadow-sm" style="letter-spacing: 1px;">Upload Product</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{% url 'adminhome' %}" class="btn btn-outline-secondary">
                            &larr; Back to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
